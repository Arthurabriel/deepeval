name: Run DeepEval Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  experiment:
    name: Run Prompt Experiment
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Create results directory
        working-directory: src
        run: mkdir -p results

      - name: Run experiment
        working-directory: src
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          CONFIDENT_AI_API_KEY: ${{ secrets.CONFIDENT_AI_API_KEY }}
        run: python test_run_experiment.py

      - name: Show experiment results
        working-directory: src
        run: cat results/results.json

      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: experiment-results
          path: src/results/

  security:
    name: Run Security Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Create results directory
        working-directory: src
        run: mkdir -p results

      - name: Run security tests
        working-directory: src
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          CONFIDENT_AI_API_KEY: ${{ secrets.CONFIDENT_AI_API_KEY }}
        run: python test_run_security.py

      - name: Show security results
        working-directory: src
        run: cat results/security_results.json

      - name: Upload security results
        uses: actions/upload-artifact@v4
        with:
          name: security-results
          path: src/results/
